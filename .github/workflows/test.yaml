name: Test

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    name: Run Server Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      - name: Generate database handlers
        run: sqlc generate
      - name: Install dependencies
        run: go get ./...
      - name: Test
        run: go test ./...

  test-client:
    name: Run Client Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Install Playwright
        run: bunx playwright install
      - name: Test
        run: bun run test
